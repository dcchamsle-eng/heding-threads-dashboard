<title>Threads 계정 대시보드</title>
<style>
  :root {
    --surface: #fcfcfb;
    --plane: #f9f9f7;
    --ink: #0b0b0b;
    --ink-soft: #52514e;
    --ink-muted: #898781;
    --gridline: #e1e0d9;
    --baseline: #c3c2b7;
    --border: rgba(11,11,11,0.10);
    --series-followers: #2a78d6;
    --series-views: #1baf7a;
    --good: #0ca30c;
    --bad: #c23b3b;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--plane);
    color: var(--ink);
  }

  body {
    font-family: system-ui, -apple-system, "Segoe UI", "Malgun Gothic", sans-serif;
    font-size: 15px;
    line-height: 1.55;
    padding: 32px 20px 72px;
  }

  .wrap { max-width: 1080px; margin: 0 auto; }

  header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 24px;
  }

  header h1 { font-size: 21px; font-weight: 700; margin: 0; letter-spacing: -0.01em; }
  header .sub { font-size: 12.5px; color: var(--ink-muted); }

  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 28px;
  }

  .stat-tile {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
  }

  .stat-tile .label {
    font-size: 11.5px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-bottom: 8px;
  }

  .stat-tile .value {
    font-size: 26px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }

  .stat-tile .value.small { font-size: 20px; }

  .charts {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 28px;
  }

  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 18px 10px;
    position: relative;
  }

  .chart-card h2 {
    font-size: 13px;
    font-weight: 700;
    margin: 0 0 2px;
  }

  .chart-card .chart-sub { font-size: 12px; color: var(--ink-muted); margin-bottom: 8px; }

  canvas.chart-canvas { width: 100%; height: 180px; display: block; cursor: crosshair; }

  .tooltip {
    position: absolute;
    pointer-events: none;
    background: var(--ink);
    color: #fff;
    font-size: 12px;
    padding: 6px 9px;
    border-radius: 6px;
    transform: translate(-50%, -120%);
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.1s ease;
    z-index: 5;
    font-variant-numeric: tabular-nums;
  }

  section.panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px 22px;
    margin-bottom: 24px;
  }

  section.panel h2 { font-size: 14px; font-weight: 700; margin: 0 0 14px; }

  table { width: 100%; border-collapse: collapse; font-size: 13.5px; }

  th, td { text-align: left; padding: 9px 10px; border-bottom: 1px solid var(--gridline); }

  th {
    font-size: 11.5px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--ink-muted);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }

  th:hover { color: var(--ink); }

  th.sorted::after { content: " " attr(data-arrow); }

  td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }

  td.post-cell a {
    color: var(--ink);
    text-decoration: none;
    display: block;
    max-width: 420px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  td.post-cell a:hover { color: var(--series-followers); text-decoration: underline; }
  td.post-cell a:focus-visible { outline: 2px solid var(--series-followers); outline-offset: 2px; }

  .rank-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--plane);
    border: 1px solid var(--border);
    font-size: 11px;
    font-weight: 700;
    color: var(--ink-soft);
    margin-right: 8px;
  }

  .empty { color: var(--ink-muted); font-size: 13px; padding: 8px 0; }

  /* ---------- password gate ---------- */

  .gate-overlay {
    position: fixed;
    inset: 0;
    background: var(--plane);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }

  .gate-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px 26px;
    width: 100%;
    max-width: 300px;
    text-align: center;
  }

  .gate-box h1 { font-size: 15px; margin: 0 0 14px; }

  .gate-box input {
    width: 100%;
    padding: 10px 12px;
    font-size: 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 10px;
    box-sizing: border-box;
  }

  .gate-box button {
    width: 100%;
    padding: 10px 12px;
    font-size: 14px;
    font-weight: 700;
    border: none;
    border-radius: 8px;
    background: var(--ink);
    color: #fff;
    cursor: pointer;
  }

  .gate-box button:disabled { opacity: 0.5; cursor: default; }

  .gate-error { color: var(--bad); font-size: 12.5px; margin-top: 8px; min-height: 16px; }

  .wrap.hidden { display: none; }

  /* ---------- weekly comparison ---------- */

  .compare-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .compare-card {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
  }

  .compare-card .period-label { font-size: 13px; font-weight: 700; margin-bottom: 2px; }
  .compare-card .period-range { font-size: 11.5px; color: var(--ink-muted); margin-bottom: 10px; }

  .compare-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 6px 0;
    border-bottom: 1px solid var(--gridline);
    font-size: 13.5px;
  }

  .compare-row:last-child { border-bottom: none; }

  .compare-row .v { font-variant-numeric: tabular-nums; font-weight: 700; }

  .delta { font-size: 11.5px; margin-left: 6px; font-variant-numeric: tabular-nums; }
  .delta.up { color: var(--good); }
  .delta.down { color: var(--bad); }
  .delta.flat { color: var(--ink-muted); }

  /* ---------- breakdown tables ---------- */

  .breakdown-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .breakdown-grid h3 { font-size: 12.5px; font-weight: 700; margin: 0 0 8px; color: var(--ink-soft); }

  @media (max-width: 760px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .charts { grid-template-columns: 1fr; }
    .compare-grid { grid-template-columns: 1fr; }
    .breakdown-grid { grid-template-columns: 1fr; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }
</style>

<div class="gate-overlay" id="gateOverlay">
  <div class="gate-box">
    <h1>비밀번호를 입력하세요</h1>
    <input type="password" id="gatePassword" placeholder="비밀번호" autocomplete="off" />
    <button id="gateSubmit">확인</button>
    <div class="gate-error" id="gateError"></div>
  </div>
</div>

<div class="wrap hidden" id="wrap">
  <header>
    <h1>Threads 계정 대시보드</h1>
    <span class="sub" id="generatedAt"></span>
  </header>

  <div class="stats">
    <div class="stat-tile">
      <div class="label">팔로워</div>
      <div class="value" id="statFollowers">—</div>
    </div>
    <div class="stat-tile">
      <div class="label">최근 프로필 조회수</div>
      <div class="value" id="statViews">—</div>
    </div>
    <div class="stat-tile">
      <div class="label">추적 중인 게시물</div>
      <div class="value" id="statPosts">—</div>
    </div>
    <div class="stat-tile">
      <div class="label">평균 반응률</div>
      <div class="value" id="statEngagement">—</div>
    </div>
  </div>

  <div class="charts">
    <div class="chart-card">
      <h2>팔로워 추이 (최근 3개월)</h2>
      <div class="chart-sub" id="followersSub">&nbsp;</div>
      <canvas class="chart-canvas" id="followersChart"></canvas>
      <div class="tooltip" id="followersTooltip"></div>
    </div>
    <div class="chart-card">
      <h2>프로필 조회수 추이</h2>
      <div class="chart-sub" id="viewsSub">&nbsp;</div>
      <canvas class="chart-canvas" id="viewsChart"></canvas>
      <div class="tooltip" id="viewsTooltip"></div>
    </div>
  </div>

  <section class="panel">
    <h2>기간 비교 · 이번 주 vs 지난 주</h2>
    <div class="compare-grid" id="weeklyCompare"></div>
  </section>

  <section class="panel">
    <h2>게시물 유형별 / 요일별 성과</h2>
    <div class="breakdown-grid">
      <div>
        <h3>유형별 (평균 조회수 순)</h3>
        <table>
          <thead><tr><th>유형</th><th class="num">게시물 수</th><th class="num">평균 조회수</th><th class="num">평균 반응률</th></tr></thead>
          <tbody id="typeBreakdownBody"></tbody>
        </table>
      </div>
      <div>
        <h3>요일별 (월~일)</h3>
        <table>
          <thead><tr><th>요일</th><th class="num">게시물 수</th><th class="num">평균 조회수</th><th class="num">평균 반응률</th></tr></thead>
          <tbody id="weekdayBreakdownBody"></tbody>
        </table>
      </div>
    </div>
  </section>

  <section class="panel">
    <h2>반응률 상위 게시물 (좋아요+댓글 ÷ 조회수)</h2>
    <div id="topEngagementList"></div>
  </section>

  <section class="panel">
    <h2>게시물별 성과 (조회수 상위 20)</h2>
    <div style="overflow-x:auto">
      <table id="postsTable">
        <thead>
          <tr>
            <th data-key="text">게시물</th>
            <th data-key="timestamp">게시일</th>
            <th class="num" data-key="views">조회수</th>
            <th class="num" data-key="likes">좋아요</th>
            <th class="num" data-key="replies">댓글</th>
            <th class="num" data-key="reposts">재게시</th>
            <th class="num" data-key="quotes">인용</th>
            <th class="num" data-key="engagement">반응률</th>
          </tr>
        </thead>
        <tbody id="postsBody"></tbody>
      </table>
    </div>
  </section>
</div>

<script>
function fmtNum(n) {
  if (n === null || n === undefined) return "—";
  return n.toLocaleString("ko-KR");
}

function fmtPct(n) {
  if (n === null || n === undefined) return "—";
  return n.toFixed(1) + "%";
}

function fmtDate(s) {
  if (!s) return "—";
  const d = new Date(s);
  return `${d.getMonth() + 1}/${d.getDate()}`;
}

function initDashboard(DATA) {

document.getElementById("generatedAt").textContent = "생성: " + DATA.generated_at;
document.getElementById("statFollowers").textContent = fmtNum(DATA.summary.latest_followers);
document.getElementById("statViews").textContent = fmtNum(DATA.summary.latest_profile_views);
document.getElementById("statPosts").textContent = fmtNum(DATA.summary.tracked_posts);
document.getElementById("statEngagement").textContent = DATA.summary.avg_engagement != null ? fmtPct(DATA.summary.avg_engagement) : "—";

// ---------------- line chart (canvas) ----------------

function drawLineChart(canvas, tooltipEl, series, color, subEl) {
  const dpr = window.devicePixelRatio || 1;
  const cssW = canvas.clientWidth || canvas.parentElement.clientWidth;
  const cssH = 180;
  canvas.width = cssW * dpr;
  canvas.height = cssH * dpr;
  canvas.style.height = cssH + "px";
  const ctx = canvas.getContext("2d");
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, cssW, cssH);

  if (!series || series.length === 0) {
    ctx.fillStyle = "#898781";
    ctx.font = "12px system-ui, sans-serif";
    ctx.fillText("데이터가 아직 없습니다.", 4, cssH / 2);
    return;
  }

  const padL = 42, padR = 10, padT = 10, padB = 20;
  const plotW = cssW - padL - padR;
  const plotH = cssH - padT - padB;

  const values = series.map(p => p.value);
  const maxV = Math.max(...values);
  const minV = Math.min(0, Math.min(...values));
  const range = (maxV - minV) || 1;

  function xAt(i) { return padL + (series.length === 1 ? plotW / 2 : (i / (series.length - 1)) * plotW); }
  function yAt(v) { return padT + plotH - ((v - minV) / range) * plotH; }

  // gridlines (4 rows)
  ctx.strokeStyle = "#e1e0d9";
  ctx.lineWidth = 1;
  ctx.font = "10.5px system-ui, sans-serif";
  ctx.fillStyle = "#898781";
  const rows = 4;
  for (let r = 0; r <= rows; r++) {
    const v = minV + (range * r / rows);
    const y = yAt(v);
    ctx.beginPath();
    ctx.moveTo(padL, y + 0.5);
    ctx.lineTo(cssW - padR, y + 0.5);
    ctx.stroke();
    ctx.fillText(Math.round(v).toLocaleString("ko-KR"), 2, y + 3);
  }

  // baseline (last actual axis)
  ctx.strokeStyle = "#c3c2b7";
  ctx.beginPath();
  ctx.moveTo(padL, padT + plotH + 0.5);
  ctx.lineTo(cssW - padR, padT + plotH + 0.5);
  ctx.stroke();

  // line
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.lineJoin = "round";
  ctx.lineCap = "round";
  ctx.beginPath();
  series.forEach((p, i) => {
    const x = xAt(i), y = yAt(p.value);
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.stroke();

  // endpoint marker
  const lastIdx = series.length - 1;
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(xAt(lastIdx), yAt(series[lastIdx].value), 3.5, 0, Math.PI * 2);
  ctx.fill();

  // x labels (first / last)
  ctx.fillStyle = "#898781";
  ctx.font = "10.5px system-ui, sans-serif";
  ctx.fillText(fmtDate(series[0].date), padL, cssH - 4);
  const lastLabel = fmtDate(series[lastIdx].date);
  ctx.fillText(lastLabel, cssW - padR - ctx.measureText(lastLabel).width, cssH - 4);

  if (subEl) {
    const first = series[0].value, last = series[lastIdx].value;
    const delta = last - first;
    const sign = delta > 0 ? "+" : "";
    subEl.textContent = `${series[0].date} ~ ${series[lastIdx].date} · ${sign}${delta.toLocaleString("ko-KR")}`;
  }

  canvas.onmousemove = (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    let closest = 0, closestDist = Infinity;
    series.forEach((p, i) => {
      const dist = Math.abs(xAt(i) - mx);
      if (dist < closestDist) { closestDist = dist; closest = i; }
    });
    const p = series[closest];
    tooltipEl.style.opacity = 1;
    tooltipEl.style.left = xAt(closest) + "px";
    tooltipEl.style.top = yAt(p.value) + "px";
    tooltipEl.textContent = `${p.date} · ${p.value.toLocaleString("ko-KR")}`;
  };
  canvas.onmouseleave = () => { tooltipEl.style.opacity = 0; };
}

function renderCharts() {
  drawLineChart(document.getElementById("followersChart"), document.getElementById("followersTooltip"), DATA.followers_series, "#2a78d6", document.getElementById("followersSub"));
  drawLineChart(document.getElementById("viewsChart"), document.getElementById("viewsTooltip"), DATA.views_series, "#1baf7a", document.getElementById("viewsSub"));
}

renderCharts();
window.addEventListener("resize", () => {
  clearTimeout(window._rt);
  window._rt = setTimeout(renderCharts, 120);
});

// ---------------- weekly comparison ----------------

function fmtDelta(curr, prev) {
  if (curr === null || curr === undefined || prev === null || prev === undefined) {
    return '<span class="delta flat">비교 불가</span>';
  }
  const diff = curr - prev;
  if (diff === 0) return '<span class="delta flat">±0</span>';
  const cls = diff > 0 ? "up" : "down";
  const sign = diff > 0 ? "+" : "";
  const pct = prev !== 0 ? ` (${sign}${Math.round((diff / Math.abs(prev)) * 100)}%)` : "";
  return `<span class="delta ${cls}">${sign}${diff.toLocaleString("ko-KR")}${pct}</span>`;
}

function renderWeeklyCompare() {
  const wc = DATA.weekly_comparison;
  const el = document.getElementById("weeklyCompare");
  if (!wc) { el.innerHTML = '<div class="empty">데이터가 아직 없습니다.</div>'; return; }

  const rows = [
    ["조회수 합계", "views"],
    ["팔로워 증감", "followers_growth"],
    ["좋아요 합계", "likes"],
    ["댓글 합계", "replies"],
  ];

  function card(period, other) {
    const rowsHtml = rows.map(([label, key]) => {
      const v = period[key];
      const deltaHtml = key === "followers_growth" ? "" : fmtDelta(v, other[key]);
      const vStr = v === null || v === undefined ? "—" : (key === "followers_growth" && v > 0 ? "+" : "") + fmtNum(v);
      return `<div class="compare-row"><span>${label}</span><span class="v">${vStr}${deltaHtml}</span></div>`;
    }).join("");
    return `
      <div class="compare-card">
        <div class="period-label">${period.label}</div>
        <div class="period-range">${period.range}</div>
        ${rowsHtml}
      </div>`;
  }

  el.innerHTML = card(wc.this_week, wc.last_week) + card(wc.last_week, wc.this_week);
}

renderWeeklyCompare();

// ---------------- type / weekday breakdowns ----------------

function renderBreakdownTable(bodyId, stats) {
  const body = document.getElementById(bodyId);
  if (!stats || stats.length === 0) {
    body.innerHTML = '<tr><td colspan="4" class="empty">데이터가 아직 없습니다.</td></tr>';
    return;
  }
  body.innerHTML = stats.map(s => `
    <tr>
      <td>${s.key}</td>
      <td class="num">${fmtNum(s.count)}</td>
      <td class="num">${s.avg_views !== null ? fmtNum(s.avg_views) : "—"}</td>
      <td class="num">${s.avg_engagement !== null ? fmtPct(s.avg_engagement) : "—"}</td>
    </tr>
  `).join("");
}

renderBreakdownTable("typeBreakdownBody", DATA.type_stats);
renderBreakdownTable("weekdayBreakdownBody", DATA.weekday_stats);

// ---------------- top engagement list ----------------

const topList = document.getElementById("topEngagementList");
const topPosts = DATA.posts.filter(p => p.engagement !== null).sort((a, b) => b.engagement - a.engagement).slice(0, 5);
if (topPosts.length === 0) {
  topList.innerHTML = '<div class="empty">아직 반응률을 계산할 데이터가 없습니다.</div>';
} else {
  topList.innerHTML = topPosts.map((p, i) => `
    <div style="display:flex;align-items:center;gap:10px;padding:8px 0;${i < topPosts.length - 1 ? 'border-bottom:1px solid var(--gridline)' : ''}">
      <span class="rank-badge">${i + 1}</span>
      <a href="${p.permalink}" target="_blank" rel="noopener" style="flex:1;color:var(--ink);text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.text}</a>
      <span style="font-variant-numeric:tabular-nums;color:var(--good);font-weight:700;flex-shrink:0">${fmtPct(p.engagement)}</span>
      <span style="font-variant-numeric:tabular-nums;color:var(--ink-muted);flex-shrink:0;width:70px;text-align:right">${fmtNum(p.views)} 조회</span>
    </div>
  `).join("");
}

// ---------------- sortable posts table (조회수 상위 20) ----------------

const TOP_POSTS = [...DATA.posts]
  .sort((a, b) => (b.views ?? -Infinity) - (a.views ?? -Infinity))
  .slice(0, 20);

let sortKey = "views", sortDir = "desc";

function renderTable() {
  const body = document.getElementById("postsBody");
  const rows = [...TOP_POSTS].sort((a, b) => {
    let av = a[sortKey], bv = b[sortKey];
    if (av === null || av === undefined) av = -Infinity;
    if (bv === null || bv === undefined) bv = -Infinity;
    if (typeof av === "string") { av = av.toLowerCase(); bv = (bv || "").toLowerCase(); }
    if (av < bv) return sortDir === "asc" ? -1 : 1;
    if (av > bv) return sortDir === "asc" ? 1 : -1;
    return 0;
  });

  body.innerHTML = rows.map(p => `
    <tr>
      <td class="post-cell"><a href="${p.permalink}" target="_blank" rel="noopener">${p.text}</a></td>
      <td>${fmtDate(p.timestamp)}</td>
      <td class="num">${fmtNum(p.views)}</td>
      <td class="num">${fmtNum(p.likes)}</td>
      <td class="num">${fmtNum(p.replies)}</td>
      <td class="num">${fmtNum(p.reposts)}</td>
      <td class="num">${fmtNum(p.quotes)}</td>
      <td class="num">${p.engagement !== null ? fmtPct(p.engagement) : "—"}</td>
    </tr>
  `).join("");

  document.querySelectorAll("th[data-key]").forEach(th => {
    th.classList.remove("sorted");
    th.removeAttribute("data-arrow");
    if (th.dataset.key === sortKey) {
      th.classList.add("sorted");
      th.setAttribute("data-arrow", sortDir === "asc" ? "▲" : "▼");
    }
  });
}

document.querySelectorAll("th[data-key]").forEach(th => {
  th.addEventListener("click", () => {
    const key = th.dataset.key;
    if (sortKey === key) {

// PBKDF2로는 32바이트 키만 뽑는다(느린 단계, 고정 비용). 실제 키스트림은 그 키로
// HMAC-SHA256(key, salt+counter)를 반복해 빠르게 늘린다 — PBKDF2 반복 횟수를 데이터
// 길이만큼의 출력에 직접 곱하면 계산량이 감당 안 되기 때문(파이썬 쪽과 동일한 방식).

async function derivePasswordKey(password, saltBytes, iterations) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(password), { name: "PBKDF2" }, false, ["deriveBits"]);
  const bits = await crypto.subtle.deriveBits({ name: "PBKDF2", salt: saltBytes, iterations, hash: "SHA-256" }, keyMaterial, 256);
  return new Uint8Array(bits);
}

async function hmacSha256(keyBytes, msgBytes) {
  const key = await crypto.subtle.importKey("raw", keyBytes, { name: "HMAC", hash: "SHA-256" }, false, ["sign"]);
  const sig = await crypto.subtle.sign("HMAC", key, msgBytes);
  return new Uint8Array(sig);
}

async function expandKeystream(key, saltBytes, length) {
  let out = new Uint8Array(0);
  let counter = 0;
  while (out.length < length) {
    const counterBytes = new Uint8Array(4);
    new DataView(counterBytes.buffer).setUint32(0, counter, false);
    const msg = new Uint8Array(saltBytes.length + 4);
    msg.set(saltBytes, 0);
    msg.set(counterBytes, saltBytes.length);
    const block = await hmacSha256(key, msg);
    const combined = new Uint8Array(out.length + block.length);
    combined.set(out, 0);
    combined.set(block, out.length);
    out = combined;
    counter++;
  }
  return out.slice(0, length);
}

async function tryUnlock(password) {
  const saltBytes = new Uint8Array(ENCRYPTED.salt.match(/.{2}/g).map(b => parseInt(b, 16)));
  const cipherBytes = Uint8Array.from(atob(ENCRYPTED.cipher), c => c.charCodeAt(0));
  const key = await derivePasswordKey(password, saltBytes, ENCRYPTED.iterations);
  const keystream = await expandKeystream(key, saltBytes, cipherBytes.length);
  const plainBytes = cipherBytes.map((b, i) => b ^ keystream[i]);
  const text = new TextDecoder("utf-8", { fatal: true }).decode(plainBytes);
  return JSON.parse(text);
}

function unlock(data) {
  document.getElementById("gateOverlay").remove();
  document.getElementById("wrap").classList.remove("hidden");
  initDashboard(data);
}

async function attemptUnlock() {

  gateSubmit.disabled = true;
  try {
    const data = await tryUnlock(gatePassword.value);
    sessionStorage.setItem("dashboardPw", gatePassword.value);
    unlock(data);
  } catch (e) {
    gateError.textContent = "비밀번호가 틀렸습니다.";
    gateSubmit.disabled = false;
  }
}

gateSubmit.addEventListener("click", attemptUnlock);
gatePassword.addEventListener("keydown", (e) => { if (e.key === "Enter") attemptUnlock(); });

(async () => {
  const saved = sessionStorage.getItem("dashboardPw");
  if (saved) {
    try {
      const data = await tryUnlock(saved);
      unlock(data);
      return;
    } catch (e) { /* 저장된 비밀번호가 안 맞으면 다시 입력받는다 */ }
  }
  gatePassword.focus();
})();
</script>
